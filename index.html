<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cover Letter Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

    /* ── Password Screen ───────────────────────────── */
    #password-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .password-card {
      background: #181818;
      border: 1px solid #252525;
      border-radius: 14px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .password-card .logo {
      width: 44px;
      height: 44px;
      background: #4f6ef7;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 20px;
    }

    .password-card h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .password-card p {
      color: #666;
      font-size: 13px;
      margin-bottom: 28px;
    }

    #password-input {
      width: 100%;
      padding: 11px 16px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }

    #password-input:focus { border-color: #4f6ef7; }
    #password-input.shake { animation: shake 0.35s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .error-msg {
      color: #e05555;
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 14px;
    }

    /* ── Buttons ───────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      outline: none;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4060e8; }

    .btn-secondary {
      background: #1f1f1f;
      color: #ccc;
      border: 1px solid #2e2e2e;
    }
    .btn-secondary:hover:not(:disabled) { background: #272727; }

    .btn-full { width: 100%; }
    .btn-sm { padding: 7px 13px; font-size: 12px; }

    /* ── App Shell ─────────────────────────────────── */
    #app {
      display: none;
      height: 100vh;
      flex-direction: column;
    }
    #app.visible { display: flex; }

    /* ── Header ────────────────────────────────────── */
    .header {
      flex-shrink: 0;
      height: 52px;
      padding: 0 20px;
      background: #111;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header-actions { display: flex; gap: 8px; }

    /* ── Body (below header) ───────────────────────── */
    .body {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }

    /* ── Form Panel ────────────────────────────────── */
    .form-panel {
      flex-shrink: 0;
      width: 340px;
      padding: 20px;
      border-right: 1px solid #1e1e1e;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #0f0f0f;
    }

    /* ── Output Panel ──────────────────────────────── */
    .output-panel {
      flex: 1;
      min-width: 0;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── History Panel ─────────────────────────────── */
    .history-panel {
      flex-shrink: 0;
      width: 0;
      overflow: hidden;
      border-left: 0px solid #1e1e1e;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      transition: width 0.2s ease, border-left-width 0.2s ease;
    }
    .history-panel.open {
      width: 270px;
      border-left-width: 1px;
    }

    .history-header {
      flex-shrink: 0;
      padding: 14px 16px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .history-header span {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .clear-btn {
      font-size: 11px;
      color: #444;
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: #e05555; }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .history-empty {
      padding: 24px 16px;
      color: #3a3a3a;
      font-size: 12px;
      text-align: center;
    }

    .history-item {
      padding: 9px 11px;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 3px;
      transition: background 0.12s, border-color 0.12s;
    }
    .history-item:hover { background: #181818; border-color: #252525; }
    .history-item.active { background: #161b2e; border-color: #2a3260; }

    .history-item-label {
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .history-item-time { font-size: 11px; color: #444; }

    /* ── Form Fields ───────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .field label .opt {
      font-size: 11px;
      font-weight: 400;
      color: #3a3a3a;
      text-transform: none;
      letter-spacing: 0;
    }

    input[type="text"], textarea {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
      width: 100%;
    }
    input[type="text"]:focus, textarea:focus { border-color: #3a4fa0; }
    input[type="text"]::placeholder, textarea::placeholder { color: #2e2e2e; }

    #job-description { min-height: 200px; }
    #notes { min-height: 66px; }

    .form-footer {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .status {
      font-size: 12px;
      color: #555;
      min-height: 16px;
      text-align: center;
    }
    .status.loading::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40%      { content: '.'; }
      60%      { content: '..'; }
      80%,100% { content: '...'; }
    }

    /* ── Output ────────────────────────────────────── */
    .output-box {
      flex: 1;
      min-height: 180px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 18px 20px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.75;
      color: #e0e0e0;
      font-family: inherit;
    }
    .output-box.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2a2a;
      font-size: 13px;
    }

    .output-actions {
      display: none;
      align-items: center;
      gap: 10px;
    }

    .copied-msg {
      font-size: 12px;
      color: #4caf7a;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .copied-msg.show { opacity: 1; }

    /* ── Refine Section ────────────────────────────── */
    .refine-section {
      display: none;
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 14px 16px;
      gap: 10px;
      flex-direction: column;
    }
    .refine-section.visible { display: flex; }

    .refine-label {
      font-size: 11px;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .refine-row { display: flex; gap: 8px; }
    .refine-row input { flex: 1; }

    /* ── Mobile ────────────────────────────────────── */
    @media (max-width: 700px) {
      .body { flex-direction: column; overflow-y: auto; }

      .form-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #1e1e1e;
      }

      .history-panel {
        width: 100% !important;
        height: 0;
        border-left: none;
        border-top: 0px solid #1e1e1e;
        transition: height 0.2s ease, border-top-width 0.2s ease;
      }
      .history-panel.open {
        width: 100% !important;
        height: 240px;
        border-top-width: 1px;
      }

      .output-panel { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ── PASSWORD SCREEN ──────────────────────────────── -->
<div id="password-screen">
  <div class="password-card">
    <div class="logo">✍️</div>
    <h1>Cover Letter Generator</h1>
    <p>Enter the password to continue</p>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
    <div class="error-msg" id="password-error"></div>
    <button class="btn btn-primary btn-full" id="unlock-btn" onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- ── MAIN APP ──────────────────────────────────────── -->
<div id="app">

  <!-- Header -->
  <div class="header">
    <span class="header-title">Cover Letter Generator</span>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" id="history-toggle-btn" onclick="toggleHistory()">History</button>
      <button class="btn btn-secondary btn-sm" onclick="lock()">Lock</button>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Form Panel -->
    <div class="form-panel">

      <div class="field">
        <label>Client Name <span class="opt">(optional)</span></label>
        <input type="text" id="client-name" placeholder="e.g. Sarah">
      </div>

      <div class="field">
        <label>Job Description</label>
        <textarea id="job-description" placeholder="Paste the full job description here..."></textarea>
      </div>

      <div class="field">
        <label>Notes <span class="opt">(optional)</span></label>
        <textarea id="notes" placeholder='e.g. "emphasize fintech", "client is Armenian"...'></textarea>
      </div>

      <div class="form-footer">
        <button class="btn btn-primary btn-full" id="generate-btn" onclick="generate()">
          Generate Cover Letter
        </button>
        <div class="status" id="status"></div>
      </div>

    </div>

    <!-- Output Panel -->
    <div class="output-panel">

      <div class="output-box empty" id="output-box">
        Your cover letter will appear here
      </div>

      <div class="output-actions" id="output-actions">
        <button class="btn btn-secondary btn-sm" onclick="copyLetter()">Copy</button>
        <span class="copied-msg" id="copied-msg">Copied!</span>
      </div>

      <div class="refine-section" id="refine-section">
        <div class="refine-label">Refine</div>
        <div class="refine-row">
          <input type="text" id="refine-input" placeholder='"make the hook shorter", "add fintech angle"...'>
          <button class="btn btn-secondary btn-sm" id="refine-btn" onclick="refine()">Refine</button>
        </div>
      </div>

    </div>

    <!-- History Panel -->
    <div class="history-panel" id="history-panel">
      <div class="history-header">
        <span>History</span>
        <button class="clear-btn" onclick="clearHistory()">Clear all</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>

  </div><!-- /body -->
</div><!-- /app -->

<script>
// ── State ──────────────────────────────────────────────────
let currentLetter        = '';
let currentJobDesc       = '';
let currentClientName    = '';
let currentNotes         = '';
let activeHistoryId      = null;
let historyPanelOpen     = false;

// ── DOM refs ───────────────────────────────────────────────
const $passwordScreen  = document.getElementById('password-screen');
const $passwordInput   = document.getElementById('password-input');
const $passwordError   = document.getElementById('password-error');
const $unlockBtn       = document.getElementById('unlock-btn');
const $app             = document.getElementById('app');
const $generateBtn     = document.getElementById('generate-btn');
const $refineBtn       = document.getElementById('refine-btn');
const $outputBox       = document.getElementById('output-box');
const $outputActions   = document.getElementById('output-actions');
const $refineSection   = document.getElementById('refine-section');
const $refineInput     = document.getElementById('refine-input');
const $status          = document.getElementById('status');
const $copiedMsg       = document.getElementById('copied-msg');
const $historyPanel    = document.getElementById('history-panel');
const $historyList     = document.getElementById('history-list');
const $historyToggle   = document.getElementById('history-toggle-btn');

// ── Password ───────────────────────────────────────────────
$passwordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
  $passwordError.textContent = '';
  $passwordInput.classList.remove('shake');
});

async function unlock() {
  const pw = $passwordInput.value;
  if (!pw.trim()) return;

  $unlockBtn.disabled = true;
  $unlockBtn.textContent = 'Checking...';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, action: 'verify' }),
    });

    if (res.ok) {
      sessionStorage.setItem('clg_pw', pw);
      showApp();
    } else {
      $passwordError.textContent = 'Incorrect password. Please try again.';
      $passwordInput.value = '';
      $passwordInput.classList.add('shake');
      $passwordInput.focus();
    }
  } catch (_) {
    $passwordError.textContent = 'Connection error - please try again.';
  } finally {
    $unlockBtn.disabled = false;
    $unlockBtn.textContent = 'Unlock';
  }
}

function showApp() {
  $passwordScreen.style.display = 'none';
  $app.classList.add('visible');
  renderHistory();
}

function lock() {
  sessionStorage.removeItem('clg_pw');
  $app.classList.remove('visible');
  $passwordScreen.style.display = 'flex';
  $passwordInput.value = '';
  $passwordError.textContent = '';
}

// ── Generate ───────────────────────────────────────────────
async function generate() {
  const jobDesc     = document.getElementById('job-description').value.trim();
  const clientName  = document.getElementById('client-name').value.trim();
  const notes       = document.getElementById('notes').value.trim();

  if (!jobDesc) {
    document.getElementById('job-description').focus();
    return;
  }

  const pw = sessionStorage.getItem('clg_pw');
  setWorking(true, 'Generating');

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, action: 'generate', jobDescription: jobDesc, clientName, notes }),
    });

    if (res.status === 401) { lock(); return; }

    const data = await res.json();
    if (data.error) { setStatus('Error: ' + data.error); return; }

    currentLetter     = data.letter;
    currentJobDesc    = jobDesc;
    currentClientName = clientName;
    currentNotes      = notes;

    displayLetter(currentLetter);
    saveToHistory(currentLetter, jobDesc, clientName, notes, null);
    setStatus('');
  } catch (_) {
    setStatus('Connection error - please try again.');
  } finally {
    setWorking(false);
  }
}

// ── Refine ─────────────────────────────────────────────────
async function refine() {
  const instruction = $refineInput.value.trim();
  if (!instruction || !currentLetter) return;

  const pw = sessionStorage.getItem('clg_pw');
  setWorking(true, 'Refining', true);

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        password: pw,
        action: 'refine',
        jobDescription:  currentJobDesc,
        clientName:      currentClientName,
        notes:           currentNotes,
        currentLetter,
        refineInstruction: instruction,
      }),
    });

    if (res.status === 401) { lock(); return; }

    const data = await res.json();
    if (data.error) { setStatus('Error: ' + data.error); return; }

    currentLetter = data.letter;
    displayLetter(currentLetter);
    saveToHistory(currentLetter, currentJobDesc, currentClientName, currentNotes, instruction);
    $refineInput.value = '';
    setStatus('');
  } catch (_) {
    setStatus('Connection error - please try again.');
  } finally {
    setWorking(false, '', true);
  }
}

$refineInput.addEventListener('keydown', e => { if (e.key === 'Enter') refine(); });

// ── UI helpers ─────────────────────────────────────────────
function displayLetter(text) {
  $outputBox.textContent = text;
  $outputBox.classList.remove('empty');
  $outputActions.style.display = 'flex';
  $refineSection.classList.add('visible');
}

function setWorking(on, label = '', refineMode = false) {
  $generateBtn.disabled = on;
  $generateBtn.textContent = on && !refineMode ? label + '...' : 'Generate Cover Letter';
  if (refineMode) { $refineBtn.disabled = on; }
  if (on) {
    $status.textContent = label;
    $status.classList.add('loading');
  } else {
    $status.classList.remove('loading');
  }
}

function setStatus(msg) {
  $status.classList.remove('loading');
  $status.textContent = msg;
}

async function copyLetter() {
  try {
    await navigator.clipboard.writeText(currentLetter);
  } catch (_) {
    const el = Object.assign(document.createElement('textarea'), {
      value: currentLetter,
      style: 'position:fixed;opacity:0',
    });
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  }
  $copiedMsg.classList.add('show');
  setTimeout(() => $copiedMsg.classList.remove('show'), 2000);
}

function toggleHistory() {
  historyPanelOpen = !historyPanelOpen;
  $historyPanel.classList.toggle('open', historyPanelOpen);
  $historyToggle.textContent = historyPanelOpen ? 'Hide History' : 'History';
  if (historyPanelOpen) renderHistory();
}

// ── History ────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem('clg_history') || '[]'); }
  catch (_) { return []; }
}

function saveHistory(items) {
  localStorage.setItem('clg_history', JSON.stringify(items));
}

function makeLabel(clientName, jobDesc, refinedWith) {
  const base = (clientName ? clientName + ' - ' : '') +
               jobDesc.split('\n')[0].trim().slice(0, 55);
  const suffix = jobDesc.split('\n')[0].trim().length > 55 ? '...' : '';
  const refineTag = refinedWith ? ' ✏️' : '';
  return (base + suffix + refineTag) || 'Cover Letter';
}

function saveToHistory(letter, jobDesc, clientName, notes, refinedWith) {
  const history = getHistory();
  const item = {
    id:          Date.now().toString(),
    timestamp:   new Date().toISOString(),
    label:       makeLabel(clientName, jobDesc, refinedWith),
    letter,
    jobDesc,
    clientName,
    notes,
    refinedWith,
  };
  history.unshift(item);
  if (history.length > 60) history.length = 60;
  saveHistory(history);
  activeHistoryId = item.id;
  if (historyPanelOpen) renderHistory();
}

function renderHistory() {
  const history = getHistory();
  if (!history.length) {
    $historyList.innerHTML = '<div class="history-empty">No history yet</div>';
    return;
  }
  $historyList.innerHTML = history.map(item => {
    const d    = new Date(item.timestamp);
    const time = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
                 ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    return `<div class="history-item${item.id === activeHistoryId ? ' active' : ''}"
                 onclick="loadHistory('${item.id}')">
              <div class="history-item-label">${esc(item.label)}</div>
              <div class="history-item-time">${time}</div>
            </div>`;
  }).join('');
}

function loadHistory(id) {
  const item = getHistory().find(h => h.id === id);
  if (!item) return;

  currentLetter     = item.letter;
  currentJobDesc    = item.jobDesc;
  currentClientName = item.clientName || '';
  currentNotes      = item.notes      || '';
  activeHistoryId   = id;

  document.getElementById('client-name').value     = item.clientName  || '';
  document.getElementById('job-description').value = item.jobDesc     || '';
  document.getElementById('notes').value           = item.notes       || '';

  displayLetter(item.letter);
  renderHistory();
}

function clearHistory() {
  if (!confirm('Delete all history? This cannot be undone.')) return;
  localStorage.removeItem('clg_history');
  activeHistoryId = null;
  renderHistory();
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ───────────────────────────────────────────────────
(function init() {
  const saved = sessionStorage.getItem('clg_pw');
  if (saved) showApp();
})();
</script>
</body>
</html>
